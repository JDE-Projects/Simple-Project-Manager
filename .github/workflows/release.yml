name: Release
on:
  push:
    tags: ['v*']
jobs:
  release:
    uses: JDE-Projects/Build-Tools/.github/workflows/release.yml@main
    permissions:
      id-token: write
      attestations: write
      contents: write
    with:
      app_name: SimpleProjectManager
      dist_subfolder: "Simple Project Manager"
      python_version: "3.14"
      build_command: "Build_Simple_Project_Manager.bat"
