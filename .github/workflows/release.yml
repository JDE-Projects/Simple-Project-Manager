name: Release
on:
  push:
    tags: ['v*']
jobs:
  release:
    uses: JDE-Projects/Build-Tools/.github/workflows/release.yml@5a862e10091ae57be5f11a3b1cf3fc83fdb95bf4 # installer pipeline + empty-folder uninstall fix
    permissions:
      id-token: write
      attestations: write
      contents: write
    with:
      app_name: SimpleProjectManager
      dist_subfolder: "Simple Project Manager"
      python_version: "3.14"
      build_command: "Build_Simple_Project_Manager.bat"
      app_id: "9c6da3fc-e0ce-4e6f-9119-00efc3e4119f"
