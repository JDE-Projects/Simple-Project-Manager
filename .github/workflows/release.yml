name: Release
on:
  push:
    tags: ['v*']
jobs:
  release:
    uses: JDE-Projects/Build-Tools/.github/workflows/release.yml@96756957ca5f5a0c15235730ee745d38f9f09440 # Build-Tools main (CI checks: ruff, import, pytest)
    permissions:
      id-token: write
      attestations: write
      contents: write
    with:
      app_name: SimpleProjectManager
      dist_subfolder: "Simple Project Manager"
      python_version: "3.14"
      build_command: "Build_Simple_Project_Manager.bat"
      app_id: "9c6da3fc-e0ce-4e6f-9119-00efc3e4119f"
      entry_script: "simple_project_manager.py"
